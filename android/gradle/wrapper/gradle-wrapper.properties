#!/bin/bash
# Gradle wrapper shell script
set -e

cd "$(dirname "$0")"

if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
    mkdir -p gradle/wrapper
    echo "Downloading Gradle wrapper..."
    curl -L https://services.gradle.org/distributions/gradle-7.6.1-bin.zip -o gradle-wrapper.zip
    unzip -q gradle-wrapper.zip
    cp gradle-7.6.1/lib/gradle-wrapper.jar gradle/wrapper/
    rm -rf gradle-wrapper.zip gradle-7.6.1
fi

echo "Gradle wrapper ready!"
